[project]
name = "clinicalmind-clinical-eval"
version = "0.1.0"
description = "RAGAS evaluation pipeline + golden set for ClinicalMind"
requires-python = ">=3.12"

dependencies = [
    "ragas>=0.1.0",
    "langchain-openai>=0.2.0",
    "httpx>=0.27.0",
    "pydantic>=2.9.0",
    "pandas>=2.2.0",
    "numpy>=2.1.0",
    "rich>=13.0.0",          # pretty eval report in terminal
    "datasets>=2.21.0",      # HuggingFace datasets (used by RAGAS)
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
