name: Eval

on:
  workflow_dispatch:           # Manual trigger only — no nightly schedule until secrets configured
  # schedule:
  #   - cron: '0 2 * * *'    # Uncomment when AZURE_OPENAI_KEY secret is set

jobs:
  eval:
    name: "RAGAS Evaluation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install eval dependencies
        run: |
          pip install --quiet \
            httpx pandas numpy rich pydantic

      - name: Run evaluation (heuristic mode if no Azure key)
        working-directory: packages/clinical-eval
        env:
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          ORCHESTRATOR_URL: "http://localhost:8000"
        run: |
          python run_eval.py \
            --golden-set data/golden_set_200.json \
            --output results/latest.json \
            --limit 5
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-${{ github.run_number }}
          path: packages/clinical-eval/results/
